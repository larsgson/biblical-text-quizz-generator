[build]
  command = "pnpm build"
  publish = "dist"

[[edge_functions]]
  function = "api-proxy"
  path = "/api/*"

# Dynamic quiz routes: rewrite to the shared page shell
[[redirects]]
  from = "/quiz/*/run"
  to = "/quiz/run"
  status = 200

[[redirects]]
  from = "/quiz/*"
  to = "/quiz/editor"
  status = 200
